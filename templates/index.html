<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BotHEX</title>
<style>
:root{
  --bg:#e5ddd5;
  --text:#303030;
  --sidebar:#202123;
  --sidebar-text:#ececf1;
  --chat-bg:#e5ddd5;
  --border:#d9d9e3;
  --accent:#25d366;
  --input-bg:#f0f0f0;
  --user-bubble:#dcf8c6;
  --user-border:#7ed957;
  --bot-bubble:#ffffff;
  --bot-border:#e0e0e0;
}
body.dark{
  --bg:#0b141a;
  --text:#e9edef;
  --sidebar:#202123;
  --sidebar-text:#ececf1;
  --chat-bg:#0b141a;
  --border:#2a3942;
  --accent:#25d366;
  --input-bg:#2a3942;
  --user-bubble:#005c4b;
  --user-border:#128c7e;
  --bot-bubble:#1f2c33;
  --bot-border:#2a3942;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* Overlay */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99;display:none}
.overlay.active{display:block}

/* Sidebar */
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:var(--sidebar);color:var(--sidebar-text);display:flex;flex-direction:column;padding:10px;transition:0.3s;z-index:100;overflow-y:auto}
.sidebar.active{left:0}
.sidebar-logo{text-align:center;padding:15px 0;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sidebar-logo img{height:45px;width:auto;border-radius:10px}
.close-btn{border:none;background:none;font-size:24px;color:var(--sidebar-text);cursor:pointer;padding:5px 10px}
.sidebar button{width:100%;padding:12px;margin-bottom:8px;background:transparent;border:1px solid var(--border);color:var(--sidebar-text);border-radius:8px;cursor:pointer;text-align:left;font-size:14px}
.sidebar button:hover{background:rgba(255,255,255,0.1)}
.sidebar h3{font-size:12px;opacity:0.6;margin:15px 10px 5px}
.chat-history{flex:1;overflow-y:auto}
.chat-history div{padding:10px;border-radius:6px;cursor:pointer;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-history div:hover{background:rgba(255,255,255,0.1)}

.main{flex:1;display:flex;flex-direction:column;width:100%;height:100vh}

/* Header */
.header{height:60px;background:#075e54;color:white;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 15px;flex-shrink:0}
body.dark.header{background:#1f2c33}
.header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
.header h1 img{height:35px;width:auto;border-radius:50%}
.menu-toggle{border:none;background:none;font-size:22px;cursor:pointer;padding:8px 12px;color:white}
.header-controls button{padding:8px 12px;border:none;background:transparent;color:white;border-radius:6px;cursor:pointer;font-size:18px}

/* Chat area */
.chat{
  flex:1;
  overflow-y:auto;
  padding:20px 8px 120px 8px;
  background:var(--chat-bg);
  background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.05"><text x="10" y="50" font-size="20">✨</text></svg>');
}

/* Row ya kila SMS */
.message{
  margin-bottom:15px;
  display:flex;
  gap:10px;
  animation:slideIn 0.3s;
  max-width:768px;
  margin-left:auto;
  margin-right:auto;
  padding:0 12px;
}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* USER - Rectangular colored border light green */
.message.user{
  justify-content:flex-end
}
.message.user.bubble{
  background:var(--user-bubble);
  color:#303030;
  max-width:75%;
  padding:12px 16px;
  border-radius:15px;
  line-height:1.5;
  white-space:pre-wrap;
  word-wrap:break-word;
  border:2px solid var(--user-border);
  border-bottom-right-radius:5px;
}
body.dark.message.user.bubble{
  color:#e9edef;
  border:2px solid var(--user-border);
}

/* BOTHEX - Rectangular colored border grey/white */
.message.bot{
  justify-content:flex-start
}
.message.bot.bubble{
  background:var(--bot-bubble);
  color:#333;
  max-width:75%;
  padding:12px 16px;
  border-radius:15px;
  line-height:1.5;
  white-space:pre-wrap;
  word-wrap:break-word;
  border:2px solid var(--bot-border);
  border-bottom-left-radius:5px;
}
body.dark.message.bot.bubble{
  color:#e9edef;
  border:2px solid var(--bot-border);
}

/* Input Area */
.input-area{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--input-bg);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;
  border-top:1px solid var(--border);
  z-index:10;
}
.input-wrap{max-width:768px;margin:0 auto;position:relative;display:flex;gap:8px;align-items:flex-end}
.input-wrap input{
  flex:1;
  padding:12px 16px;
  border:1px solid var(--border);
  border-radius:24px;
  background:var(--chat-bg);
  color:var(--text);
  font-size:15px;
  outline:none;
  max-height:120px;
  resize:none
}
.input-wrap input:focus{border-color:var(--accent)}
.input-wrap button{
  width:44px;
  height:44px;
  border:none;
  background:var(--accent);
  color:white;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0
}
.input-wrap button:disabled{opacity:0.3;cursor:not-allowed}

@media(max-width:768px){
.sidebar{position:fixed;z-index:100;height:100%}
.message{max-width:100%}
.message.user.bubble,.message.bot.bubble{max-width:75%}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="/static/logo.jpg" alt="BotHEX">
    <button class="close-btn" onclick="toggleSidebar()">✕</button>
  </div>
  <button onclick="newChat()">➕ New chat</button>
  <button onclick="backupData()">💾 Backup Ubongo</button>
  <button onclick="document.getElementById('uploadFile').click()">📤 Pakia Ubongo</button>
  <input type="file" id="uploadFile" accept=".json,.zip" style="display:none" onchange="uploadData()">
  <button onclick="setLang('sw')">🇹🇿 Kiswahili</button>
  <button onclick="setLang('en')">🇺🇸 English</button>
  <h3>Chat history</h3>
  <div class="chat-history" id="chatHistory"></div>
</div>

<div class="main">
  <div class="header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <h1>
      <img src="/static/logo.jpg" alt="BotHEX">
      <span>BotHEX</span>
    </h1>
    <div class="header-controls">
      <button onclick="toggleTheme()">🌓</button>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Andika ujumbe..." onkeypress="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()" id="sendBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const userId = localStorage.getItem('bothex_user') || 'user_' + Math.random().toString(36).substr(2, 9);
localStorage.setItem('bothex_user', userId);

let chats = JSON.parse(localStorage.getItem('bothex_chats') || '{}');
let currentChat = localStorage.getItem('bothex_current') || 'chat_' + Date.now();
if(!chats[currentChat]) chats[currentChat] = [];

function toggleSidebar(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('active');
  overlay.classList.toggle('active');
}

function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('bothex_theme', document.body.classList.contains('dark')? 'dark' : 'light');
}
if(localStorage.getItem('bothex_theme') === 'dark'){document.body.classList.add('dark')}

function renderChat(){
  const chatDiv = document.getElementById('chat');
  chatDiv.innerHTML = '';
  chats[currentChat].forEach((msg) => {
    addMessage(msg.text, msg.role, false);
  });
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function addMessage(text, role, save=true){
  const chatDiv = document.getElementById('chat');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ' + role;
  const content = document.createElement('div');
  content.className = 'bubble';
  content.textContent = text;
  msgDiv.appendChild(content);
  chatDiv.appendChild(msgDiv);
  chatDiv.scrollTop = chatDiv.scrollHeight;
  if(save){
    chats[currentChat].push({role, text});
    localStorage.setItem('bothex_chats', JSON.stringify(chats));
    updateHistory();
  }
}

async function sendMsg(){
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if(!msg) return;
  addMessage(msg, 'user');
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  try{
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({msg: msg, user_id: userId})
    });
    const data = await res.json();
    document.getElementById('sendBtn').disabled = false;
    if(data.reply2){
      addMessage(data.reply, 'bot');
      setTimeout(() => addMessage(data.reply2, 'bot'), 500);
    } else {
      addMessage(data.reply, 'bot');
    }
  }catch(e){
    document.getElementById('sendBtn').disabled = false;
    addMessage('⚠️ Connection error. Hakikisha Pydroid3 iko ON', 'bot', false);
  }
}

function newChat(){
  currentChat = 'chat_' + Date.now();
  chats[currentChat] = [];
  localStorage.setItem('bothex_current', currentChat);
  renderChat();
  updateHistory();
}

function updateHistory(){
  const histDiv = document.getElementById('chatHistory');
  histDiv.innerHTML = '';
  Object.keys(chats).reverse().forEach(id => {
    const firstMsg = chats[id][0]?.text || 'New chat';
    const div = document.createElement('div');
    div.textContent = firstMsg.substring(0, 30);
    div.onclick = () => {
      currentChat = id;
      localStorage.setItem('bothex_current', currentChat);
      renderChat();
      toggleSidebar();
    };
    histDiv.appendChild(div);
  });
}

async function setLang(lang){
  await fetch('/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({msg: lang === 'sw'? 'switch to kiswahili' : 'switch to english', user_id: userId})
  });
  const input = document.getElementById('input');
  input.placeholder = lang === 'sw'? 'Niulize chochote...' : 'Ask me anything...';
  addMessage(lang === 'sw'? 'Lugha imebadilishwa kuwa Kiswahili' : 'Language switched to English', 'bot', false);
}

function backupData(){
  addMessage('Ninatengeneza backup ya ubongo wako...', 'bot', false);
  window.location.href = '/backup';
}

async function uploadData(){
  const file = document.getElementById('uploadFile').files[0];
  if(!file) return;
  addMessage('Ninapakia ubongo mpya...', 'bot', false);
  const formData = new FormData();
  formData.append('file', file);
  try{
    const res = await fetch('/upload', {method: 'POST', body: formData});
    const data = await res.json();
    addMessage(data.reply, 'bot', false);
    if(data.reply.includes('imewekwa')) setTimeout(() => location.reload(), 2000);
  }catch(e){
    addMessage('⚠️ Imeshindwa kupakia file.', 'bot', false);
  }
}

renderChat();
updateHistory();
if(chats[currentChat].length === 0){
  addMessage('Hi! Mimi ni BotHEX, AI assistant wa HEX-Robotics TZ 🇹🇿', 'bot', false);
  addMessage('Niulize chochote 😊', 'bot', false);
}
</script>
</body>
</html>
